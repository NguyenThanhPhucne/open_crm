    _title: "All Activities"
  requirements:
    _custom_access: '\Drupal\crm\Controller\AllActivitiesController::accessView'
    _user_is_logged_in: "TRUE"

crm.my_activities:
  path: "/crm/my-activities"
  defaults:
    _controller: '\Drupal\crm\Controller\AllActivitiesController::view'
    _title: "My Activities"
  requirements:
    _custom_access: '\Drupal\crm\Controller\AllActivitiesController::accessView'
    _user_is_logged_in: "TRUE"

crm.all_organizations:
  path: "/crm/all-organizations"
  defaults:
    _controller: '\Drupal\crm\Controller\AllOrganizationsController::view'
    _title: "All Organizations"
  requirements:
    _custom_access: '\Drupal\crm\Controller\AllOrganizationsController::accessView'

crm.my_organizations:
  path: "/crm/my-organizations"
  defaults:
    _controller: '\Drupal\crm\Controller\AllOrganizationsController::view'
    _title: "My Organizations"
  requirements:
    _custom_access: '\Drupal\crm\Controller\AllOrganizationsController::accessView'

crm.contact_delete_ajax:
  path: "/api/contacts/{nid}/delete"
  defaults:
    _controller: '\Drupal\crm\Controller\ContactsListController::deleteContact'
    _title: "Delete Contact"
  requirements:
    _custom_access: '\Drupal\crm\Controller\ContactsListController::accessDeleteContact'
    nid: \d+
  methods:
    - POST
  options:
    _auth:
      - cookie
