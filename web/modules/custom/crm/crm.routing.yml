crm.user_profile:
  path: "/user/{user}/profile"
  defaults:
    _controller: '\Drupal\crm\Controller\UserProfileController::view'
    _title: "User Profile"
  requirements:
    _permission: "access user profiles"
    user: \d+
  options:
    parameters:
      user:
        type: entity:user

crm.user_profile_canonical:
  path: "/user/{user}"
  defaults:
    _controller: '\Drupal\crm\Controller\UserProfileController::view'
    _title_callback: '\Drupal\crm\Controller\UserProfileController::getTitle'
  requirements:
    _custom_access: '\Drupal\crm\Controller\UserProfileController::access'
    user: \d+
  options:
    parameters:
      user:
        type: entity:user

crm.node_detail_canonical:
  path: "/node/{node}"
  defaults:
    _controller: '\Drupal\crm\Controller\NodeDetailController::view'
    _title_callback: '\Drupal\crm\Controller\NodeDetailController::getTitle'
  requirements:
    _custom_access: '\Drupal\crm\Controller\NodeDetailController::access'
    node: \d+
  options:
    parameters:
      node:
        type: entity:node

crm.all_contacts:
