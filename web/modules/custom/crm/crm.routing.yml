crm.user_profile:
  path: "/user/{user}/profile"
  defaults:
    _controller: '\Drupal\crm\Controller\UserProfileController::view'
    _title: "User Profile"
  requirements:
    _permission: "access user profiles"
    user: \d+
  options:
    parameters:
      user:
        type: entity:user

crm.user_profile_canonical:
  path: "/user/{user}"
  defaults:
    _controller: '\Drupal\crm\Controller\UserProfileController::view'
    _title_callback: '\Drupal\crm\Controller\UserProfileController::getTitle'
  requirements:
    _custom_access: '\Drupal\crm\Controller\UserProfileController::access'
    user: \d+
  options:
    parameters:
      user:
        type: entity:user

crm.contact_delete_ajax:
  path: "/api/contacts/{nid}/delete"
  defaults:
    _controller: '\Drupal\crm\Controller\ContactsListController::deleteContact'
    _title: "Delete Contact"
  requirements:
    _custom_access: '\Drupal\crm\Controller\ContactsListController::accessDeleteContact'
    nid: \d+
  methods:
    - POST
  options:
    _auth:
      - cookie
