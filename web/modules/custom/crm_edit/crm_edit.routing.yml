# GET /api/v1/crm/stages
# Get available deal stages from taxonomy
crm_edit.api_get_stages:
  path: "/api/v1/crm/stages"
  defaults:
    _controller: '\Drupal\crm_edit\Controller\InlineEditController::getStages'
  requirements:
    _permission: "access content"
    _user_is_logged_in: "TRUE"
  methods: [GET]
# PHASE 2: REST API endpoint for inline field editing
# PATCH /api/v1/{entity_type}/{entity_id}/{field_name}
# Update a single field on an entity
crm_edit.api_update_field:
  path: "/api/v1/{entity_type}/{entity_id}/{field_name}"
  defaults:
    _controller: '\Drupal\crm_edit\Controller\InlineEditController::updateField'
  requirements:
    _permission: "access content"
    _user_is_logged_in: "TRUE"
    entity_type: "[a-z_]+"
    entity_id: '\d+'
    field_name: "[a-z_]+"
  methods: [PATCH]

# PHASE 3: Batch update with conflict detection
# POST /api/v1/batch-update
# Update multiple fields with optimistic locking
crm_edit.api_batch_update:
  path: "/api/v1/batch-update"
  defaults:
    _controller: '\Drupal\crm_edit\Controller\BatchUpdateController::batchUpdate'
  requirements:
    _permission: "access content"
    _user_is_logged_in: "TRUE"
  methods: [POST]

# GET /api/v1/entity/{entity_type}/{entity_id}
# Get entity data with field values and revision info
crm_edit.api_get_entity:
  path: "/api/v1/entity/{entity_type}/{entity_id}"
  defaults:
    _controller: '\Drupal\crm_edit\Controller\BatchUpdateController::getEntity'
  requirements:
    _permission: "access content"
    _user_is_logged_in: "TRUE"
    entity_type: "[a-z_]+"
    entity_id: '\d+'
  methods: [GET]
