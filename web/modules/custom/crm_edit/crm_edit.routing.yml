crm_edit.edit_contact:
  path: "/crm/edit/contact/{node}"
  defaults:
    _controller: '\Drupal\crm_edit\Controller\InlineEditController::editContact'
    _title: "Edit Contact"
  requirements:
    _permission: "edit own contact content+edit any contact content"
    node: \d+
  options:
    parameters:
      node:
        type: entity:node

crm_edit.edit_deal:
  path: "/crm/edit/deal/{node}"
  defaults:
    _controller: '\Drupal\crm_edit\Controller\InlineEditController::editDeal'
    _title: "Edit Deal"
  requirements:
    _permission: "edit own deal content+edit any deal content"
    node: \d+
  options:
    parameters:
      node:
        type: entity:node

crm_edit.edit_organization:
  path: "/crm/edit/organization/{node}"
  defaults:
    _controller: '\Drupal\crm_edit\Controller\InlineEditController::editOrganization'
    _title: "Edit Organization"
  requirements:
    _permission: "edit own organization content+edit any organization content"
    node: \d+
  options:
    parameters:
      node:
        type: entity:node

crm_edit.edit_activity:
