crm_login.login:
  path: "/login"
  defaults:
    _form: '\Drupal\crm_login\Form\CrmLoginForm'
    _title: "Login"
  requirements:
    _permission: "access content"
    _user_is_logged_in: "FALSE"

crm_login.access_denied:
  path: "/access-denied"
  defaults:
    _controller: '\Drupal\crm_login\Controller\ErrorPageController::accessDenied'
    _title: "Access Denied"
  requirements:
    _access: "TRUE"

crm_login.not_found:
  path: "/page-not-found"
  defaults:
    _controller: '\Drupal\crm_login\Controller\ErrorPageController::notFound'
    _title: "Page Not Found"
  requirements:
    _access: "TRUE"
