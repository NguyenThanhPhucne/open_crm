langcode: en
status: true
dependencies:
  enforced:
    module:
      - crm_import
id: organization_csv_import
label: "Organization CSV Import"
description: "Import organizations from CSV file"
help: "Upload a CSV file with columns: name, website, industry, address, status"
import_period: -1
fetcher: upload
fetcher_configuration:
  allowed_extensions: "csv txt"
  directory: "public://feeds/organizations"
  allowed_schemes:
    - public
parser: csv
parser_configuration:
  delimiter: ","
  no_headers: false
  encoding: UTF-8
processor: "entity:node"
processor_configuration:
  langcode: site_default
  values:
    type: organization
  authorize: true
  update_existing: 1
  update_non_existent: skip
  skip_hash_check: false
  expiration: -1
  owner_feed_author: true
custom_sources: {}
mappings:
  - target: title
    map:
      value: name
    unique:
      value: true
  - target: field_website
    map:
      uri: website
  - target: field_industry
    map:
      value: industry
  - target: field_address
    map:
      value: address
  - target: field_status
    map:
      value: status
  - target: uid
    map:
      target_id: "1"
