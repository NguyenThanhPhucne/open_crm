services:
  crm_advanced_filters.filter_service:
    class: Drupal\crm_advanced_filters\Service\FilterService
    arguments:
      - "@entity_type.manager"
      - "@database"
      - "@logger.factory"
      - "@crm.access_service"

  crm_advanced_filters.saved_filter_service:
    class: Drupal\crm_advanced_filters\Service\SavedFilterService
    arguments:
      - "@entity_type.manager"
      - "@current_user"

  crm_advanced_filters.suggestion_service:
    class: Drupal\crm_advanced_filters\Service\SuggestionService
    arguments:
      - "@entity_type.manager"
      - "@database"
      - "@crm_advanced_filters.filter_service"
