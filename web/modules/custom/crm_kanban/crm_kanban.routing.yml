crm_kanban.pipeline:
  path: "/crm/my-pipeline"
  defaults:
    _controller: '\Drupal\crm_kanban\Controller\KanbanController::view'
    _title: "Sales Pipeline"
  requirements:
    _custom_access: '\Drupal\crm_kanban\Controller\KanbanController::accessView'

crm_kanban.all_pipeline:
  path: "/crm/all-pipeline"
  defaults:
    _controller: '\Drupal\crm_kanban\Controller\KanbanController::view'
    _title: "All Pipeline"
  requirements:
    _custom_access: '\Drupal\crm_kanban\Controller\KanbanController::accessView'

crm_kanban.update_stage:
  path: "/crm/my-pipeline/update-stage"
  defaults:
    _controller: '\Drupal\crm_kanban\Controller\KanbanController::updateStage'
  requirements:
    _custom_access: '\Drupal\crm_kanban\Controller\KanbanController::accessView'
  options:
    no_cache: TRUE
