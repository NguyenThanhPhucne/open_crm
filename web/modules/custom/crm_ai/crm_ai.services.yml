services:
  crm_ai.entity_autocomplete_service:
    class: Drupal\crm_ai\Service\AIEntityAutoCompleteService
    arguments:
      - '@config.factory'
      - '@entity_type.manager'
      - '@http_client'
      - '@logger.factory'
      - '@crm_ai.entity_schema_service'
      - '@crm_ai.llm_provider_service'
      - '@crm_ai.field_validator_service'
      - '@messenger'
    tags:
      - { name: logger_channel, channel: crm_ai }

  crm_ai.entity_schema_service:
    class: Drupal\crm_ai\Service\EntitySchemaService
    arguments:
      - '@entity_field.manager'
      - '@entity_type.manager'

  crm_ai.llm_provider_service:
    class: Drupal\crm_ai\Service\LLMProviderService
    arguments:
      - '@config.factory'
      - '@http_client'
      - '@logger.factory'
    tags:
      - { name: logger_channel, channel: crm_ai }

  crm_ai.field_validator_service:
    class: Drupal\crm_ai\Service\FieldValidatorService

  crm_ai.controller.autocomplete:
    class: Drupal\crm_ai\Controller\AIAutoCompleteController
    arguments:
      - '@crm_ai.entity_autocomplete_service'
