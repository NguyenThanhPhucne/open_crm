crm_ai.autocomplete_endpoint:
  path: '/api/crm/ai/autocomplete'
  defaults:
    _controller: '\Drupal\crm_ai\Controller\AIAutoCompleteController::autoCompleteEndpoint'
    _title: 'AI Autocomplete'
  requirements:
    _custom_access: '\Drupal\crm_ai\Controller\AIAutoCompleteController::accessAutoComplete'
  methods:
    - POST

crm_ai.config_form:
  path: '/admin/config/crm/ai'
  defaults:
    _form: '\Drupal\crm_ai\Form\AIConfigForm'
    _title: 'CRM AI AutoComplete Settings'
  requirements:
    _admin_permission: 'administer crm ai'
