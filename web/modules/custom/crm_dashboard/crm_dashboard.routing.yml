crm_dashboard.admin:
  path: "/admin/crm"
  defaults:
    _controller: '\Drupal\crm_dashboard\Controller\DashboardController::view'
    _title: "CRM Dashboard"
  requirements:
    _permission: "access content"
    _user_is_logged_in: 'TRUE'

crm_dashboard.dashboard:
  path: "/crm/dashboard"
  defaults:
    _controller: '\Drupal\crm_dashboard\Controller\DashboardController::view'
    _title: "CRM Dashboard"
  requirements:
    _permission: "access content"
    _user_is_logged_in: 'TRUE'

crm_dashboard.test:
  path: "/crm/dashboard-new"
  defaults:
    _controller: '\Drupal\crm_dashboard\Controller\DashboardController::view'
    _title: "NEW Dashboard Test"
  requirements:
    _permission: "access content"
    _user_is_logged_in: 'TRUE'

crm_dashboard.refresh:
  path: "/crm/dashboard/refresh"
  defaults:
    _controller: '\Drupal\crm_dashboard\Controller\DashboardController::getRefreshData'
  requirements:
    _permission: "access content"
    _user_is_logged_in: 'TRUE'
    _method: "GET|POST"
