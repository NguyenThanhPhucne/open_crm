# Nginx reverse-proxy config for CRM realtime chat
# Domain: phucnt-open-crm.training.weebpal.com
# Upstream Node chat backend: 127.0.0.1:5001
#
# Usage:
# 1) Put the `map` block in nginx.conf -> http { ... }
# 2) Put the `location` blocks in your existing server block for the domain

# -------- http {} level --------
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# -------- server {} level example --------
server {
  listen 443 ssl http2;
  server_name phucnt-open-crm.training.weebpal.com;

  # Keep your existing SSL settings/cert paths here.
  # ssl_certificate ...
  # ssl_certificate_key ...

  # Keep your existing Drupal/PHP root + location / config above/below.

  # 1) REST API proxy for chat backend
  location /api/node/ {
    proxy_pass http://127.0.0.1:5001/api/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Needed for auth refresh cookie and secure cross-site handling
    proxy_set_header Origin $scheme://$host;
    proxy_cookie_path / "/; Secure; HttpOnly; SameSite=None";

    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  # 2) Socket.IO websocket proxy
  location /socket.io/ {
    proxy_pass http://127.0.0.1:5001/socket.io/;
    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_buffering off;
  }
}
