langcode: en
status: true
dependencies:
  config:
    - search_api.server.crm_database
    - node.type.contact
  module:
    - search_api
    - node
id: crm_contacts_index
name: "CRM Contacts"
description: "Search index for CRM contacts with fulltext search"
read_only: false
field_settings:
  title:
    label: "Name"
    datasource_id: "entity:node"
    property_path: title
    type: text
    boost: !!float 5
  field_email:
    label: "Email"
    datasource_id: "entity:node"
    property_path: field_email
    type: string
    boost: !!float 3
  field_phone:
    label: "Phone"
    datasource_id: "entity:node"
    property_path: field_phone
    type: string
    boost: !!float 2
  field_position:
    label: "Position"
    datasource_id: "entity:node"
    property_path: field_position
    type: string
  field_organization:
    label: "Organization"
    datasource_id: "entity:node"
    property_path: "field_organization:entity:title"
    type: text
    dependencies:
      config:
        - field.storage.node.field_organization
  field_owner:
    label: "Owner"
    datasource_id: "entity:node"
    property_path: "field_owner:entity:name"
    type: string
    dependencies:
      config:
        - field.storage.node.field_owner
  created:
    label: "Created"
    datasource_id: "entity:node"
    property_path: created
    type: date
  changed:
    label: "Changed"
    datasource_id: "entity:node"
    property_path: changed
    type: date
  status:
    label: "Published"
    datasource_id: "entity:node"
    property_path: status
    type: boolean
  rendered_item:
    label: "Rendered HTML output"
    property_path: rendered_item
    type: text
    configuration:
      roles:
        - authenticated
      view_mode:
        "entity:node":
          contact: full
datasource_settings:
  "entity:node":
    bundles:
      default: false
      selected:
        - contact
    languages:
      default: true
      selected: {}
processor_settings:
  add_url: {}
  aggregated_field: {}
  custom_value: {}
  entity_status: {}
  entity_type: {}
  highlight: {}
  html_filter: {}
  ignorecase:
    fields:
      - title
      - field_email
      - field_phone
      - rendered_item
  language_with_fallback: {}
  rendered_item: {}
  stopwords: {}
  tokenizer:
    fields:
      - title
      - rendered_item
  transliteration:
    fields:
      - title
      - field_email
      - field_phone
tracker_settings:
  default:
    indexing_order: fifo
options:
  cron_limit: 50
  index_directly: true
  track_changes_in_references: true
server: crm_database
